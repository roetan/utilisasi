<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Player HLS + DASH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Plyr CSS -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<!-- HLS.js & DASH.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<!-- Plyr JS -->
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

.video-wrapper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
}

video {
    width: auto;
    height: 100vh;
    max-width: 100%;
    object-fit: cover;
    background: black;
}

.plyr,
.plyr__video-wrapper {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.plyr video {
    height: 100%;
    width: auto;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="video-wrapper">
    <video id="player" controls playsinline autoplay muted></video>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get('url');
const video = document.getElementById('player');

function initializeVideo(url) {
    if (!url) return;

    if (url.endsWith('.m3u8')) {
        // HLS
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
    } else if (url.endsWith('.mpd')) {
        // DASH
        const dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(video, url, true);
    } else {
        // fallback: langsung set src
        video.src = url;
    }
}

// jalankan
initializeVideo(url);

// Plyr
const player = new Plyr(video, {
    controls: [
        'play-large',
        'play',
        'progress',
        'current-time',
        'mute',
        'volume',
        'settings',
        'pip',
        'fullscreen'
    ]
});

player.on('ready', () => {
    video.muted = true; // agar autoplay bisa jalan di browser
    video.play().catch(() => {});
});
</script>

</body>
</html>
