<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Player</title>
    <meta name="referrer" content="no-referrer">
    <meta content="width=device-width,initial-scale=1.0" name="viewport">

    <!-- Plyr -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 🔥 ini yang bikin full memenuhi area */
            background: black;
        }

        /* Plyr override biar ikut full */
        .plyr {
            height: 100%;
        }

        .plyr__video-wrapper {
            height: 100%;
        }

        .plyr video {
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>

<div class="video-wrapper">
    <video id="player" controls playsinline></video>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');

    const video = document.getElementById('player');

    let hls;

    function startVideo() {
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {

        startVideo();

        const player = new Plyr(video, {
            controls: [
                'play-large',
                'play',
                'progress',
                'current-time',
                'mute',
                'volume',
                'settings',
                'pip',
                'fullscreen'
            ]
        });

        // autoplay (kalau diizinkan browser)
        player.on('ready', () => {
            player.play().catch(() => {});
        });

    });
</script>

</body>
</html>
