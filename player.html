<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<title>Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* 🔥 container mengikuti tinggi browser */
.video-wrapper {
    position: fixed;
    inset: 0; /* top:0 right:0 bottom:0 left:0 */
    display: flex;
}

/* 🔥 video FULL COVER tapi tetap ikut container */
video {
    width: 100%;
    height: 100%;
    object-fit: cover; /* inti utama */
    background: black;
}

/* Plyr fix supaya ikut full */
.plyr,
.plyr__video-wrapper {
    height: 100%;
}

.plyr video {
    object-fit: cover;
}
</style>
</head>

<body>

<div class="video-wrapper">
    <video id="player" controls playsinline></video>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get('url');

const video = document.getElementById('player');

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
} else {
    video.src = url;
}

const player = new Plyr(video);

player.on('ready', () => {
    player.play().catch(() => {});
});
</script>

</body>
</html>
