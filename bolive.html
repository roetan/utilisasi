<script>
// Auto-block script eksternal mencurigakan
(function() {
    // Override loadAclib atau fungsi serupa agar tidak jalan
    window.loadAclib = Promise.resolve();
    window.runAclib = function(){};

    // Simpan referensi appendChild asli
    const originalAppend = Document.prototype.appendChild;

    Document.prototype.appendChild = function(element) {
        // Cek hanya untuk tag SCRIPT eksternal
        if (element.tagName === 'SCRIPT' && element.src) {
            const blockedKeywords = [
                'lolo_',          // nama script iklan yang sebelumnya
                'pop',            // pop-up
                'ad',             // iklan
                'tracking',       // tracking
                'analytics'       // analytics mencurigakan
            ];

            // Jika src mengandung kata kunci yang mencurigakan
            if (blockedKeywords.some(kw => element.src.toLowerCase().includes(kw))) {
                console.log('Script diblokir otomatis:', element.src);
                return element; // jangan append script
            }
        }
        return originalAppend.call(this, element); // script lain tetap jalan
    };
})();
</script>

<script>
function openURL(button, url) {
    document.getElementById('urlView').src = url;

    // Hapus class 'active' dari semua tombol
    const buttons = document.querySelectorAll('.right button');
    buttons.forEach(btn => btn.classList.remove('active'));

    // Tambahkan class 'active' ke tombol yang diklik

}
