<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Smart Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<style>
html, body {
    margin:0; height:100%; background:black; overflow:hidden;
}
.video-wrapper {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:black;
}
video {
    width:auto; height:100vh; max-width:100%; object-fit:cover; background:black;
}
.plyr, .plyr__video-wrapper {
    height:100%; display:flex; align-items:center; justify-content:center;
}
.plyr video {
    height:100%; width:auto; object-fit:cover;
}
</style>
</head>
<body>

<div class="video-wrapper">
    <video id="player" controls playsinline autoplay muted></video>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const mediaUrl = params.get('url');

const video = document.getElementById('player');

async function initializeVideo(url) {
    if (!url) return;

    // Auto-detect extension
    const isHLS = url.endsWith('.m3u8');
    const isDASH = url.endsWith('.mpd');

    if (isHLS) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
        }
    } else if (isDASH) {
        shaka.polyfill.installAll();
        const playerDash = new shaka.Player(video);

        playerDash.configure({
            drm: {
                retryParameters: { maxAttempts: 3, baseDelay: 1000, backoffFactor: 2 }
            },
            streaming: {
                rebufferingGoal: 2,
                bufferingGoal: 30
            }
        });

        try {
            await playerDash.load(url);
            console.log('DASH/DRM ready');
        } catch(e) {
            console.warn('DASH gagal, fallback ke HLS jika ada', e);

            const fallbackHLS = url.replace('.mpd', '.m3u8');
            if (fallbackHLS !== url) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(fallbackHLS);
                    hls.attachMedia(video);
                    console.log('Fallback HLS loaded');
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = fallbackHLS;
                }
            }
        }
    } else {
        video.src = url;
    }
}

initializeVideo(mediaUrl);

const player = new Plyr(video, {
    controls: [
        'play-large','play','progress','current-time','mute',
        'volume','settings','pip','fullscreen'
    ]
});

player.on('ready', () => {
    video.muted = true;
    video.play().catch(()=>{});
});
</script>

</body>
</html>
